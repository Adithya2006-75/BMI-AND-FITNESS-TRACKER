<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouFit - Ultimate Fitness</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0c0f;
  color:#fff;
}

/* PAGES */
.page{display:none;padding:20px;}
.page.active{display:block}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
}
.nav div{
  flex:1;
  text-align:center;
  padding:12px;
  cursor:pointer;
}
.nav div.active{color:#39d353}

/* CARD */
.card{
  background:#161b22;
  padding:15px;
  border-radius:10px;
  margin:10px 0;
}

button{
  padding:10px;
  margin:5px;
  border:none;
  background:#39d353;
  color:#000;
  cursor:pointer;
  border-radius:5px;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="page-home" class="page active">
  <h1>YouFit 💪</h1>
  <div class="card">
    <p>Sets: <span id="sets">0</span></p>
    <p>Volume: <span id="vol">0</span></p>
    <p>Streak: <span id="streak">0</span></p>
  </div>
</div>

<!-- LOG -->
<div id="page-log" class="page">
  <h2>Log Workout</h2>
  <input type="number" id="reps" placeholder="Reps">
  <input type="number" id="weight" placeholder="Weight">
  <button onclick="addSet()">Add Set</button>
  <button onclick="saveWorkout()">Save</button>
</div>

<!-- TIMER -->
<div id="page-timer" class="page">
  <h2>Timer</h2>
  <h1 id="time">00:00</h1>
  <button onclick="startTimer()">Start</button>
  <button onclick="stopTimer()">Stop</button>
</div>

<!-- STATS -->
<div id="page-stats" class="page">
  <h2>Stats</h2>
  <canvas id="chart"></canvas>
</div>

<!-- STREAK -->
<div id="page-streak" class="page">
  <h2>Streak</h2>
  <p id="streakPage"></p>
</div>

<!-- PLAN -->
<div id="page-plan" class="page">
  <h2>Timetable</h2>
  <input id="day" placeholder="Day">
  <input id="exercise" placeholder="Exercise">
  <button onclick="addPlan()">Add</button>
  <ul id="planList"></ul>
</div>

<!-- BMI -->
<div id="page-bmi" class="page">
  <h2>BMI</h2>
  <input id="h" placeholder="Height (cm)">
  <input id="w" placeholder="Weight (kg)">
  <button onclick="calcBMI()">Calculate</button>
  <p id="bmiResult"></p>
</div>

<!-- PR -->
<div id="page-prs" class="page">
  <h2>PRs</h2>
  <ul id="prList"></ul>
</div>

<!-- NAV -->
<div class="nav">
  <div onclick="goTo('home')" id="nav-home" class="active">Home</div>
  <div onclick="goTo('log')" id="nav-log">Log</div>
  <div onclick="goTo('timer')" id="nav-timer">Timer</div>
  <div onclick="goTo('stats')" id="nav-stats">Stats</div>
  <div onclick="goTo('streak')" id="nav-streak">Streak</div>
  <div onclick="goTo('plan')" id="nav-plan">Plan</div>
  <div onclick="goTo('bmi')" id="nav-bmi">BMI</div>
  <div onclick="goTo('prs')" id="nav-prs">PR</div>
</div>

<script>
// NAV
function goTo(p){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.nav div').forEach(x=>x.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  document.getElementById('nav-'+p).classList.add('active');

  if(p==='stats') loadChart();
  if(p==='prs') showPRs();
}

// DATA
let logs = JSON.parse(localStorage.getItem("logs")||"[]");
let setsTemp=[];

// LOG
function addSet(){
  let r=document.getElementById('reps').value;
  let w=document.getElementById('weight').value;
  setsTemp.push({r,w});
}

function saveWorkout(){
  logs.push(setsTemp);
  localStorage.setItem("logs",JSON.stringify(logs));
  setsTemp=[];
  alert("Saved");
  updateHome();
  detectPR();
}

// HOME
function updateHome(){
  let sets=0,vol=0;
  logs.forEach(day=>{
    day.forEach(s=>{
      sets++;
      vol+=s.r*s.w;
    });
  });
  document.getElementById('sets').innerText=sets;
  document.getElementById('vol').innerText=vol;
}
updateHome();

// TIMER
let t=0,interval;
function startTimer(){
  interval=setInterval(()=>{
    t++;
    document.getElementById('time').innerText=t;
  },1000);
}
function stopTimer(){
  clearInterval(interval);
}

// STATS
function loadChart(){
  new Chart(document.getElementById('chart'),{
    type:'bar',
    data:{
      labels:['Data'],
      datasets:[{data:[logs.length]}]
    }
  });
}

// BMI
function calcBMI(){
  let h=document.getElementById('h').value/100;
  let w=document.getElementById('w').value;
  let bmi=w/(h*h);
  document.getElementById('bmiResult').innerText=bmi.toFixed(2);
}

// PLAN
function addPlan(){
  let d=document.getElementById('day').value;
  let e=document.getElementById('exercise').value;
  let li=document.createElement('li');
  li.innerText=d+" - "+e;
  document.getElementById('planList').appendChild(li);
}

// PR
function detectPR(){
  let prs=JSON.parse(localStorage.getItem("prs")||"{}");
  logs.flat().forEach(s=>{
    if(!prs.max || s.w>prs.max){
      prs.max=s.w;
    }
  });
  localStorage.setItem("prs",JSON.stringify(prs));
}

function showPRs(){
  let prs=JSON.parse(localStorage.getItem("prs")||"{}");
  document.getElementById('prList').innerHTML="<li>Max Weight: "+(prs.max||0)+"</li>";
}
</script>

</body>
</html>
